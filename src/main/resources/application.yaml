spring:
  application:
    name: GestionInventario
  datasource:
    url: jdbc:mysql://localhost:3306/gestion_inventario_moto?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

app:
  jwt:
    secret: ${JWT_SECRET:this-is-a-dev-secret-must-be-at-least-32-bytes}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:30}