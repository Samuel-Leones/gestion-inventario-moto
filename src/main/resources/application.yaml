server:
  port: 8080

spring:
  application:
    name: GestionInventario

  datasource:
    url: jdbc:mysql://localhost:3306/gestion_inventario_moto?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    time-zone: America/Bogota


app:
  jwt:
    secret: ${JWT_SECRET:5d3e8b2c4f8a1e7b9d6c5a3f1e8d2b7c9f4a6b8d1e3c5a7f9b2d4e6c8a1f3b5}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:30}


springdoc:
  api-docs:
    enabled: true
    path: /api-docs

  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true


logging:
  level:
    root: INFO
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE